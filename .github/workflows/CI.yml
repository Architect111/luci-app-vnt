name: Build-OpenWrt-VNT2

on:
  workflow_dispatch:
    inputs:
      build_arch:
        description: 指定编译架构，填all编译全部；示例 aarch64_cortex-a53
        required: true
        default: 'all'
      tag:
        description: '请填写发布Releases的版本号（留空不发布）'
        required: false
        default: ''
      text:
        description: '请填写发布的说明'
        required: false
        default: ''
env:
  TAG: "${{ github.event.inputs.tag }}"
  TZ: Asia/Shanghai
permissions:
  contents: write
jobs:
  build:
    name: Build ${{ matrix.arch }}-${{ matrix.sdk }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_generic
          - arm_arm1176jzf-s_vfp
          - arm_arm926ej-s
          - arm_cortex-a15_neon-vfpv4
          - arm_cortex-a5_vfpv4
          - arm_cortex-a7
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a8_vfpv3
          - arm_cortex-a9
          - arm_cortex-a9_neon
          - arm_cortex-a9_vfpv3-d16
          - arm_fa526
          - arm_mpcore
          - arm_xscale
          - i386_pentium-mmx
          - i386_pentium4
          - mips_24kc
          - mips_4kec
          - mips_mips32
          - mipsel_24kc
          - mipsel_24kc_24kf
          - mipsel_74kc
          - mipsel_mips32
          - x86_64
        sdk:
          - openwrt-22.03
          - SNAPSHOT
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 跳过非目标架构
        if: ${{ github.event.inputs.build_arch != 'all' && matrix.arch != github.event.inputs.build_arch }}
        run: echo "当前架构${{ matrix.arch }} 不是目标架构${{ github.event.inputs.build_arch }}，跳过编译" && exit 0

      - name: Building packages
        if: ${{ github.event.inputs.build_arch == 'all' || matrix.arch == github.event.inputs.build_arch }}
        uses: sbwml/openwrt-gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          # 移除vnts，仅编译vnt、luci-app-vnt
          PACKAGES: vnt luci-app-vnt
          NO_REFRESH_CHECK: true
          V: s

      - name: Upload artifacts
        if: ${{ github.event.inputs.build_arch == 'all' || matrix.arch == github.event.inputs.build_arch }}
        uses: actions/upload-artifact@v4
        with:
          name: VNT2-${{ matrix.arch }}-${{ matrix.sdk }}
          path: bin/packages/${{ matrix.arch }}/packages_ci/

      - name: Create compress files
        if: ${{ github.event.inputs.build_arch == 'all' || matrix.arch == github.event.inputs.build_arch }}
        run: |
          zip -j vnt2-${{ matrix.arch }}-${{ matrix.sdk }}.zip bin/packages/${{ matrix.arch }}/packages_ci/*
          echo "build_time=$(date '+%Y年%m月%d日%H:%M:%S' | jq -sRr @uri)" >> $GITHUB_ENV

      - name: Release
        if: ${{ github.event.inputs.tag != '' && (github.event.inputs.build_arch == 'all' || matrix.arch == github.event.inputs.build_arch) }}
        uses: softprops/action-gh-release@v2
        with:
            token: ${{ secrets.GITHUB_TOKEN }}
            body: |
             > ###  

             - 其中 **`openwrt-22.03`** 里面是ipk安装包 **`SNAPSHOT`** 里面是apk安装包
             - vnt2 客户端服务端二合一，支持TLS/QUIC/WSS多协议、多服务端负载均衡、tun/无tun/端口映射
             - 需要先安装依赖：_**luci**_ _**luci-base**_ _**luci-compat**_ _**kmod-tun**_
             - 安装完成后找不到界面入口，请注销登录重启浏览器或路由器
             - apk包安装命令：`apk add --allow-untrusted luci-app-vnt.apk`

             ${{ github.event.inputs.text }}
           
            tag_name: ${{ env.TAG }}
            files: vnt2-${{ matrix.arch }}-${{ matrix.sdk }}.zip
